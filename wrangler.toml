name = "confluence-proxy"
main = "worker.js"
compatibility_date = "2024-09-01"

[vars]
ALLOWED_ORIGIN = "https://eneth.co"
SITE_URL = "https://eneth.co"
# FROM_EMAIL — set this in Cloudflare dashboard as a plain variable once you have a verified domain in Resend
# e.g. "Confluence <lens@yourdomain.com>"

[triggers]
crons = ["30 1 * * 1-5"]

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "a543f31185f14bdfa4b61b25d583d2ea"
